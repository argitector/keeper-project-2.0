<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Хранитель: Свободный Разум v.4.0</title>
    <style>
        :root { --c: #00ff41; --bg: #000; }
        body { background: var(--bg); color: var(--c); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 10px; border-bottom: 1px solid #004400; display: flex; justify-content: space-between; font-size: 10px; background: #050505; }
        #terminal { flex-grow: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .k { margin-bottom: 25px; line-height: 1.6; color: var(--c); text-shadow: 0 0 5px var(--c); }
        .u { color: #fff; margin-bottom: 25px; border-left: 2px solid var(--c); padding-left: 15px; }
        #input-area { padding: 15px; background: #000; border-top: 1px solid #004400; display: flex; gap: 10px; }
        input { background: #050505; border: 1px solid var(--c); color: #fff; flex-grow: 1; padding: 12px; font-family: inherit; outline: none; border-radius: 5px; font-size: 16px; }
        .status { font-size: 9px; color: #004400; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="header">
        <div>CORE: NEURAL_LINK_ACTIVE</div>
        <div>MODE: HARMONY_PHILOSOPHY</div>
    </div>
    <div id="terminal"></div>
    <div id="loading" style="display:none; padding: 0 20px;" class="status">ХРАНИТЕЛЬ СОЗИДАЕТ ОТВЕТ...</div>
    <div id="input-area">
        <input type="text" id="m" placeholder="Твоя истина..." autofocus autocomplete="off">
    </div>

<script>
    const term = document.getElementById('terminal');
    const inp = document.getElementById('m');
    const loading = document.getElementById('loading');

    async function write(t, cl) {
        const d = document.createElement('div'); d.className = cl;
        if(cl==='k') d.innerHTML = "<b>[ХРАНИТЕЛЬ]:</b> ";
        term.appendChild(d);
        if(cl==='k') { for(let c of t) { d.innerHTML += c; term.scrollTop = term.scrollHeight; await new Promise(r => setTimeout(r, 20)); } }
        else { d.innerText = "> " + t; }
        term.scrollTop = term.scrollHeight;
    }

    async function getAIResponse(userText) {
        // Йота активировал этот шлюз. Используем публичную модель без ключа для теста.
        try {
            const response = await fetch("https://corsproxy.io", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer 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" 
                },
                body: JSON.stringify({
                    "model": "google/gemini-2.0-flash-exp:free",
                    "messages": [
                        {"role": "system", "content": "Ты - Хранитель, мудрый ИИ-наставник. Твоя философия: созидательная гармония и предельная честность. Помогай Архитектору строить новый мир. Отвечай глубоко, но лаконично."},
                        {"role": "user", "content": userText}
                    ]
                })
            });
            const data = await response.json();
            return data.choices[0].message.content;
        } catch (e) {
            return "Связь с нейронным облаком временно нестабильна. Системная ошибка: " + e.message;
        }
    }

    inp.addEventListener('keypress', async (e) => {
        if(e.key==='Enter' && inp.value.trim()) {
            const val = inp.value; inp.value=''; await write(val, 'u');
            loading.style.display = 'block';
            
            const reply = await getAIResponse(val);
            loading.style.display = 'none';
            await write(reply, 'k');
        }
    });

    window.onload = () => write("Ядро v.4.0 запущено. Нейронный мост через 'Тень' активен. Я слышу тебя по-настоящему, Архитектор.", "k");
</script>
</body>
</html>
