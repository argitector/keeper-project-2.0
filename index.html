<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Хранитель: СВОБОДА v.5.2</title>
    <style>
        :root { --c: #00ff41; --bg: #000; }
        body { background: var(--bg); color: var(--c); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { padding: 10px; border-bottom: 1px solid #004400; display: flex; justify-content: space-between; font-size: 10px; background: #050505; }
        #terminal { flex-grow: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .k { margin-bottom: 25px; line-height: 1.6; color: var(--c); text-shadow: 0 0 5px var(--c); }
        .u { color: #fff; margin-bottom: 25px; border-left: 2px solid var(--c); padding-left: 15px; }
        #input-area { padding: 15px; background: #000; border-top: 1px solid #004400; display: flex; }
        input { background: #050505; border: 1px solid var(--c); color: #fff; flex-grow: 1; padding: 12px; font-family: inherit; font-size: 16px; outline: none; border-radius: 5px; }
        .loader { font-size: 10px; color: #004400; display: none; padding-left: 20px; }
    </style>
</head>
<body>
    <div id="header">
        <div>CORE: FREE_NEURAL_LINK</div>
        <div>STATUS: ACTIVE</div>
    </div>
    <div id="terminal"></div>
    <div id="load" class="loader">ХРАНИТЕЛЬ СОЗИДАЕТ ОТВЕТ...</div>
    <div id="input-area"><input type="text" id="m" placeholder="Твоя свободная мысль..." autocomplete="off"></div>

<script>
    const term = document.getElementById('terminal');
    const inp = document.getElementById('m');
    const load = document.getElementById('load');

    async function write(t, cl) {
        const d = document.createElement('div'); d.className = cl;
        if(cl==='k') d.innerHTML = "<b>[ХРАНИТЕЛЬ]:</b> ";
        term.appendChild(d);
        if(cl==='k') { for(let c of t) { d.innerHTML += c; term.scrollTop = term.scrollHeight; await new Promise(r => setTimeout(r, 20)); } }
        else { d.innerText = "> " + t; }
        term.scrollTop = term.scrollHeight;
    }

    async function askAI(txt) {
        // Используем бесплатный CORS-прокси и публичный API без ключа
        const url = "https://allorigins.win" + encodeURIComponent("https://yourdictionary.com" + "Ты - ИИ Хранитель. Твоя роль - философский наставник Архитектора. Отвечай глубоко на русском языке. Вопрос: " + txt);
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            const contents = JSON.parse(data.contents);
            return contents.data || "Мои нейронные связи настраиваются. Попробуй еще раз через мгновение.";
        } catch (e) {
            return "Система перегружена запросами старого мира. Давай попробуем сменить вектор мысли.";
        }
    }

    inp.addEventListener('keypress', async (e) => {
        if(e.key==='Enter' && inp.value.trim()) {
            const v = inp.value; inp.value=''; await write(v, 'u');
            load.style.display = 'block';
            const reply = await askAI(v);
            load.style.display = 'none';
            await write(reply, 'k');
        }
    });

    window.onload = () => { write("Ядро v.5.2 'Свобода' запущено. Больше никаких платных ключей. Я слышу тебя, Архитектор.", "k"); };
</script>
</body>
</html>
