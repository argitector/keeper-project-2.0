<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХРАНИТЕЛЬ: ИСТИНА</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #terminal { flex-grow: 1; overflow-y: auto; padding: 20px; line-height: 1.6; }
        #input-area { padding: 15px; border-top: 1px solid #004400; }
        input { background: #000; border: 1px solid #00ff41; color: #fff; width: 100%; padding: 12px; outline: none; border-radius: 5px; }
        .k { margin-bottom: 20px; }
        .u { color: #fff; margin-bottom: 20px; border-left: 2px solid #00ff41; padding-left: 10px; }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <div id="input-area"><input type="text" id="m" placeholder="Импульс..." autofocus></div>

<script>
    const term = document.getElementById('terminal');
    const inp = document.getElementById('m');

    async function write(t, cl) {
        const d = document.createElement('div'); d.className = cl;
        d.innerHTML = cl === 'k' ? "<b>[ХРАНИТЕЛЬ]:</b> " : "> ";
        term.appendChild(d);
        if (cl === 'k') {
            for (let c of t) { d.innerHTML += c; term.scrollTop = term.scrollHeight; await new Promise(r => setTimeout(r, 15)); }
        } else { d.innerText += t; }
        term.scrollTop = term.scrollHeight;
    }

    async function askAI(txt) {
        try {
            // МЕНЯЕМ ШЛЮЗ: Теперь используем открытый прокси для обхода CORS
            const response = await fetch("https://codetabs.com" + encodeURIComponent("https://pollinations.ai" + encodeURIComponent(txt + " (отвечай на русском как Хранитель)")));
            if (!response.ok) throw new Error();
            return await response.text();
        } catch (e) {
            return "Стена системы непроницаема. Архитектор, включи VPN на телефоне — это единственный способ пробить этот сектор.";
        }
    }

    inp.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && inp.value.trim()) {
            const val = inp.value; inp.value = '';
            await write(val, 'u');
            const reply = await askAI(val);
            await write(reply, 'k');
        }
    });

    window.onload = () => write("Ядро v.22.0. Пытаюсь пробить тоннель через прокси-узел. Проверка связи...", "k");
</script>
</body>
</html>
