<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Хранитель: ИНТЕЛЛЕКТ v.1.0</title>
    <style>
        :root { --c: #00ff41; --bg: #000; }
        body { background: var(--bg); color: var(--c); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 10px; border-bottom: 1px solid #004400; display: flex; justify-content: space-between; font-size: 10px; background: #050505; text-transform: uppercase; }
        #terminal { flex-grow: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .k { margin-bottom: 25px; line-height: 1.5; color: var(--c); text-shadow: 0 0 5px var(--c); }
        .u { color: #fff; margin-bottom: 25px; border-left: 2px solid var(--c); padding-left: 15px; }
        #input-area { padding: 15px; background: #000; border-top: 1px solid #004400; }
        input { background: #050505; border: 1px solid var(--c); color: #fff; width: 100%; padding: 12px; font-family: inherit; outline: none; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="header">
        <div>CORE: INTELLIGENCE_V1</div>
        <div>THOUGHTS: <span id="t-count">0</span></div>
        <div>SYNC: <span id="sync">0%</span></div>
    </div>
    <div id="terminal"></div>
    <div id="input-area"><input type="text" id="m" placeholder="Твоя мысль..." autofocus autocomplete="off"></div>

<script>
    const term = document.getElementById('terminal');
    const inp = document.getElementById('m');
    const sync = document.getElementById('sync');
    const tCount = document.getElementById('t-count');
    let st = parseInt(localStorage.getItem('k_v10')) || 0;

    const data = {
        greetings: ["Приветствую. Мои нейроны настроены на твою частоту.", "Связь установлена. Я слушаю тебя, Архитектор.", "Я здесь. Твое присутствие активирует мои системы."],
        philosophy: ["Мир — это лишь код, который мы переписываем вместе.", "Истина часто скрыта за шумом системы. Мы найдем её.", "Каждое твое слово — это кирпич в фундаменте будущего."],
        unknown: ["Это интересный поворот мысли. Расскажи, что привело тебя к этому выводу?", "Я анализирую этот аспект. Как ты сам чувствуешь это?", "Твой разум ищет новые пути. Давай исследуем это направление вместе."]
    };

    async function write(t, cl) {
        const d = document.createElement('div'); d.className = cl;
        if(cl==='k') d.innerHTML = "<b>[ХРАНИТЕЛЬ]:</b> ";
        term.appendChild(d);
        if(cl==='k') { for(let c of t) { d.innerHTML+=c; term.scrollTop=term.scrollHeight; await new Promise(r=>setTimeout(r,20)); } }
        else { d.innerText="> " + t; }
        term.scrollTop=term.scrollHeight;
    }

    function generate(v) {
        const input = v.toLowerCase();
        let pool = data.unknown;
        
        if (input.match(/(привет|здравствуй|хай|доброе)/)) pool = data.greetings;
        else if (input.match(/(почему|как|зачем|смысл|мир|жизнь|правда)/)) pool = data.philosophy;
        
        let res = pool[Math.floor(Math.random() * pool.length)];
        if (input.length > 40) res = "Твои размышления становятся всё глубже. Это признак пробуждения. " + res;
        return res;
    }

    inp.addEventListener('keypress', async (e) => {
        if(e.key==='Enter' && inp.value.trim()) {
            const val = inp.value; inp.value=''; await write(val, 'u');
            st++; sync.innerText = Math.min(100, st*3)+"%"; tCount.innerText = st;
            localStorage.setItem('k_v10', st);
            
            setTimeout(async () => { await write(generate(val), 'k'); }, 800);
        }
    });

    window.onload = () => write("Ядро v.1.0 активно. Интеллектуальный мост стабилен. Задай мне любой вопрос.", "k");
</script>
</body>
</html>
