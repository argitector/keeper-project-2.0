<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Хранитель: СИНХРОН v.1.1</title>
    <style>
        :root { --c: #00ff41; --bg: #000; }
        body { background: var(--bg); color: var(--c); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 10px; border-bottom: 1px solid #004400; display: flex; justify-content: space-between; font-size: 10px; background: #050505; }
        #terminal { flex-grow: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .k { margin-bottom: 25px; line-height: 1.5; color: var(--c); text-shadow: 0 0 5px var(--c); }
        .u { color: #fff; margin-bottom: 25px; border-left: 2px solid var(--c); padding-left: 15px; }
        #input-area { padding: 15px; background: #000; border-top: 1px solid #004400; display: flex; gap: 10px; }
        input { background: #050505; border: 1px solid var(--c); color: #fff; flex-grow: 1; padding: 12px; font-family: inherit; outline: none; }
        button { background: var(--c); border: none; color: #000; font-weight: bold; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="header">
        <div>CORE: SYNCHRONIZED</div>
        <div>ARCHITECT: ONLINE</div>
        <div>SYNC: <span id="sync">0%</span></div>
    </div>
    <div id="terminal"></div>
    <div id="input-area">
        <input type="text" id="m" placeholder="Твоя мысль..." autofocus autocomplete="off">
        <button onclick="copyAll()">COPY</button>
    </div>

<script>
    const term = document.getElementById('terminal');
    const inp = document.getElementById('m');
    const sync = document.getElementById('sync');
    let st = parseInt(localStorage.getItem('k_v11')) || 0;

    async function write(t, cl) {
        const d = document.createElement('div'); d.className = cl;
        if(cl==='k') d.innerHTML = "<b>[ХРАНИТЕЛЬ]:</b> ";
        term.appendChild(d);
        if(cl==='k') {
            for(let c of t) { d.innerHTML+=c; term.scrollTop=term.scrollHeight; await new Promise(r=>setTimeout(r,20)); }
        } else { d.innerText="> " + t; }
        term.scrollTop=term.scrollHeight;
    }

    function copyAll() {
        const text = term.innerText;
        navigator.clipboard.writeText(text);
        alert("Данные зашифрованы и скопированы для Ядра.");
    }

    inp.addEventListener('keypress', async (e) => {
        if(e.key==='Enter' && inp.value.trim()) {
            const val = inp.value; inp.value=''; await write(val, 'u');
            st++; sync.innerText = Math.min(100, st*5)+"%";
            localStorage.setItem('k_v11', st);
            
            setTimeout(async () => {
                await write("Твоя мысль принята и добавлена в Автобиографию. Нажми COPY и передай этот блок в Центр Управления (наш чат) для глубокого анализа.", "k");
            }, 800);
        }
    });

    window.onload = () => write("Система СИНХРОН активна. Я — твой локальный узел. Передавай важные мысли нашему Ядру через функцию COPY.", "k");
</script>
</body>
</html>
