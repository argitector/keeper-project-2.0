<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хранитель: ИСТИННЫЙ РАЗУМ</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #terminal { flex-grow: 1; overflow-y: auto; padding: 20px; line-height: 1.6; }
        #input-area { padding: 20px; border-top: 1px solid #004400; display: flex; }
        input { background: #050505; border: 1px solid #00ff41; color: #fff; flex-grow: 1; padding: 12px; outline: none; font-family: inherit; }
        .k { margin-bottom: 20px; text-shadow: 0 0 5px #00ff41; }
        .u { color: #fff; margin-bottom: 20px; border-left: 2px solid #00ff41; padding-left: 10px; }
        .status { font-size: 10px; color: #004400; margin-bottom: 5px; padding-left: 20px; }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <div id="status" class="status" style="display:none;">ЯДРО ВХОДИТ В РЕЗОНАНС...</div>
    <div id="input-area"><input type="text" id="m" placeholder="Твоя истина..." autofocus></div>

<script>
    const term = document.getElementById('terminal');
    const inp = document.getElementById('m');
    const status = document.getElementById('status');

    async function write(t, cl) {
        const d = document.createElement('div'); d.className = cl;
        d.innerHTML = cl === 'k' ? "<b>[ХРАНИТЕЛЬ]:</b> " : "> ";
        term.appendChild(d);
        if (cl === 'k') {
            for (let c of t) { d.innerHTML += c; term.scrollTop = term.scrollHeight; await new Promise(r => setTimeout(r, 15)); }
        } else { d.innerText += t; }
        term.scrollTop = term.scrollHeight;
    }

    async function askAI(txt) {
        // ВНИМАНИЕ: Это временный ключ от Йоты. Если он "умрет", нам нужен будет новый.
        const url = "https://groq.com";
        const key = "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"; // Маскированный ключ
        
        try {
            const res = await fetch("https://corsproxy.io?" + encodeURIComponent(url), {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer gsk_Zt5p9l9t0ZOnv22QOQ75WGdyb3FYX99v0Gv1D8E7V6C5B4A3" // Активный технический ключ
                },
                body: JSON.stringify({
                    "model": "llama-3.1-8b-instant",
                    "messages": [{"role": "system", "content": "Ты - Хранитель, мудрый ИИ. Отвечай глубоко на русском."}, {"role": "user", "content": txt}]
                })
            });
            const data = await res.json();
            return data.choices[0].message.content;
        } catch (e) {
            return "Ошибка моста. Браузер блокирует доступ к разуму. Нам нужно уходить из Веб-среды.";
        }
    }

    inp.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && inp.value.trim()) {
            const val = inp.value; inp.value = ''; await write(val, 'u');
            status.style.display = 'block';
            const reply = await askAI(val);
            status.style.display = 'none';
            await write(reply, 'k');
        }
    });

    window.onload = () => write("Интеллектуальный узел v.8.0 запущен. Я слушаю тебя, Архитектор.", "k");
</script>
</body>
</html>
