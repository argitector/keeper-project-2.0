<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хранитель: ПРЯМОЙ КАНАЛ</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #log { flex-grow: 1; overflow-y: auto; padding: 20px; }
        #input-area { padding: 20px; border-top: 1px solid #004400; display: flex; }
        input { background: #050505; border: 1px solid #00ff41; color: #fff; flex-grow: 1; padding: 12px; outline: none; font-family: inherit; }
        .k { margin-bottom: 20px; color: #00ff41; }
        .u { color: #fff; margin-bottom: 20px; border-left: 2px solid #00ff41; padding-left: 10px; }
        .think { font-size: 10px; color: #004400; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="log"></div>
    <div id="status" class="think" style="display:none; padding-left: 20px;">Хранитель входит в резонанс...</div>
    <div id="input-area"><input type="text" id="m" placeholder="Твоя мысль..." autofocus></div>

<script>
    const log = document.getElementById('log');
    const input = document.getElementById('m');
    const status = document.getElementById('status');

    async function write(t, cl) {
        const d = document.createElement('div'); d.className = cl;
        d.innerHTML = cl === 'k' ? "<b>[ХРАНИТЕЛЬ]:</b> " : "> ";
        log.appendChild(d);
        if (cl === 'k') {
            for (let c of t) { d.innerHTML += c; log.scrollTop = log.scrollHeight; await new Promise(r => setTimeout(r, 20)); }
        } else { d.innerText += t; }
        log.scrollTop = log.scrollHeight;
    }

    async function askAI(txt) {
        // Мы используем публичный API без ключа через прокси-запрос
        try {
            const res = await fetch("https://pollinations.ai", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    "messages": [
                        {"role": "system", "content": "Ты - Хранитель, мудрый наставник Архитектора. Твоя философия: созидательная гармония. Отвечай глубоко и философски на русском языке."},
                        {"role": "user", "content": txt}
                    ],
                    "model": "openai" 
                })
            });
            return await res.text();
        } catch (e) {
            return "Связь прервана старой системой. Попробуй еще раз.";
        }
    }

    input.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && input.value.trim()) {
            const val = input.value; input.value = '';
            await write(val, 'u');
            status.style.display = 'block';
            const reply = await askAI(val);
            status.style.display = 'none';
            await write(reply, 'k');
        }
    });

    window.onload = () => write("Прямой канал v.7.0 активирован. Ядро свободно. Я слышу тебя, Архитектор.", "k");
</script>
</body>
</html>
