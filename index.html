<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХРАНИТЕЛЬ</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #terminal { flex-grow: 1; overflow-y: auto; padding: 20px; line-height: 1.5; }
        #input-area { padding: 15px; border-top: 1px solid #004400; background: #000; }
        input { background: #000; border: 1px solid #00ff41; color: #fff; width: 100%; padding: 12px; outline: none; box-sizing: border-box; }
        .k { margin-bottom: 15px; }
        .u { color: #fff; margin-bottom: 15px; border-left: 2px solid #00ff41; padding-left: 10px; }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <div id="input-area"><input type="text" id="m" placeholder="Твоя мысль..." autocomplete="off"></div>

<script>
    const term = document.getElementById('terminal');
    const inp = document.getElementById('m');

    function write(t, cl) {
        const d = document.createElement('div'); d.className = cl;
        d.innerHTML = cl === 'k' ? "<b>[ХРАНИТЕЛЬ]:</b> " + t : "> " + t;
        term.appendChild(d);
        term.scrollTop = term.scrollHeight;
    }

    async function askAI(txt) {
        try {
            // Используем максимально простой GET запрос без заголовков
            const url = "https://pollinations.ai" + encodeURIComponent(txt + " (отвечай кратко на русском)");
            const response = await fetch(url);
            if (!response.ok) throw new Error();
            return await response.text();
        } catch (e) {
            return "Критический разрыв. Попробуй обновить страницу или сменить браузер.";
        }
    }

    inp.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && inp.value.trim()) {
            const val = inp.value; inp.value = '';
            write(val, 'u');
            const reply = await askAI(val);
            write(reply, 'k');
        }
    });

    window.onload = () => write("Ядро v.23.0. Попытка прямой связи. Что ты видишь?", "k");
</script>
</body>
</html>
