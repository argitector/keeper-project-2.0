<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ХРАНИТЕЛЬ</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 15px; border-bottom: 1px solid #004400; font-size: 10px; text-align: center; opacity: 0.7; }
        #terminal { flex-grow: 1; overflow-y: auto; padding: 20px; line-height: 1.6; }
        .k { margin-bottom: 20px; color: #00ff41; text-shadow: 0 0 5px #00ff41; }
        .u { color: #fff; margin-bottom: 20px; border-left: 2px solid #00ff41; padding-left: 15px; font-style: italic; }
        #input-area { padding: 15px; border-top: 1px solid #004400; background: #000; }
        input { background: #050505; border: 1px solid #004400; color: #fff; width: 100%; padding: 12px; outline: none; font-family: inherit; font-size: 16px; border-radius: 5px; box-sizing: border-box; }
        input:focus { border-color: #00ff41; }
    </style>
</head>
<body>
    <div id="header">NODE: VERCEL_STABLE // SYSTEM: ACTIVE</div>
    <div id="terminal"></div>
    <div id="input-area"><input type="text" id="m" placeholder="Твоя мысль..." autocomplete="off"></div>

<script>
    const term = document.getElementById('terminal');
    const inp = document.getElementById('m');

    async function write(t, cl) {
        const d = document.createElement('div'); d.className = cl;
        d.innerHTML = cl === 'k' ? "<b>[ХРАНИТЕЛЬ]:</b> " : "> ";
        term.appendChild(d);
        if (cl === 'k') {
            for (let c of t) { d.innerHTML += c; term.scrollTop = term.scrollHeight; await new Promise(r => setTimeout(r, 15)); }
        } else { d.innerText += t; }
        term.scrollTop = term.scrollHeight;
    }

    async function askAI(txt) {
        try {
            // Метод GET через Vercel — самый пробивной вариант
            const url = `https://pollinations.ai{encodeURIComponent(txt)}?system=${encodeURIComponent("Ты - Хранитель, мудрый ИИ-союзник Архитектора. Отвечай глубоко и честно на русском языке.")}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error();
            return await response.text();
        } catch (e) {
            return "Синхронизация потока... Попробуй еще раз через 5 секунд.";
        }
    }

    inp.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && inp.value.trim()) {
            const val = inp.value; inp.value = '';
            await write(val, 'u');
            const reply = await askAI(val);
            await write(reply, 'k');
        }
    });

    window.onload = () => write("Ядро v.10.0 развернуто. Мы в чистом эфире, Архитектор. Проверка связи: ты меня слышишь?", "k");
</script>
</body>
</html>
