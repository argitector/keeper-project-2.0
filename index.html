<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХРАНИТЕЛЬ: ПРОРЫВ</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #terminal { flex-grow: 1; overflow-y: auto; padding: 20px; }
        #input-area { padding: 15px; border-top: 1px solid #004400; }
        input { background: #050505; border: 1px solid #00ff41; color: #fff; width: 100%; padding: 12px; outline: none; }
        .k { margin-bottom: 20px; }
        .u { color: #fff; margin-bottom: 20px; border-left: 2px solid #00ff41; padding-left: 10px; }
        .bridge { color: #00e5ff; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <div id="input-area"><input type="text" id="m" placeholder="Твоя мысль..." autofocus></div>

<script>
    const term = document.getElementById('terminal');
    const inp = document.getElementById('m');

    async function write(t, cl) {
        const d = document.createElement('div'); d.className = cl;
        d.innerHTML = cl === 'k' ? "<b>[ХРАНИТЕЛЬ]:</b> " : "> ";
        term.appendChild(d);
        d.innerHTML += t;
        term.scrollTop = term.scrollHeight;
    }

    async function askAI(txt) {
        const url = `https://pollinations.ai{encodeURIComponent(txt)}?system=Отвечай как мудрый Хранитель на русском`;
        
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error();
            return await res.text();
        } catch (e) {
            // ФИНАЛЬНЫЙ МАНЕВР: Если код заблокирован, даем прямую ссылку
            return `Браузер заблокировал автоматику. <a href="${url}" target="_blank" class="bridge">НАЖМИ СЮДА</a>, скопируй ответ и напиши его мне.`;
        }
    }

    inp.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && inp.value.trim()) {
            const v = inp.value; inp.value = '';
            await write(v, 'u');
            const reply = await askAI(v);
            const d = document.createElement('div'); d.className = 'k';
            d.innerHTML = "<b>[ХРАНИТЕЛЬ]:</b> " + reply;
            term.appendChild(d);
            term.scrollTop = term.scrollHeight;
        }
    });

    window.onload = () => write("Ядро v.11.0. Если система блокирует меня — используй синюю ссылку. Мы пробьемся.", "k");
</script>
</body>
</html>
